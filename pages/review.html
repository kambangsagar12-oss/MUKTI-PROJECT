<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Section</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      padding: 40px 20px;
    }

    .review-box {
      max-width: 750px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .review-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #111;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #333;
    }

    #reviews-list {
      margin-top: 30px;
    }

    .review-item {
      background: #f0f0f0;
      padding: 18px;
      margin-top: 18px;
      border-radius: 12px;
      position: relative;
    }

    .review-item h3 {
      margin-bottom: 8px;
      color: #111;
      padding-right: 40px;
    }

    .review-item p {
      margin-bottom: 8px;
      color: #444;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .review-images {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .review-images img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .review-images img:hover {
      transform: scale(1.04);
    }

    .review-files {
      margin-top: 10px;
    }

    .review-files a {
      display: block;
      margin-top: 6px;
      color: #0066cc;
      text-decoration: none;
      word-break: break-word;
    }

    .review-files a:hover {
      text-decoration: underline;
    }

    .menu-container {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .menu-btn {
      background: transparent;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #111;
      padding: 4px 8px;
      line-height: 1;
    }

    .menu {
      display: none;
      position: absolute;
      top: 30px;
      right: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-width: 110px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      z-index: 10;
    }

    .menu button {
      width: 100%;
      border: none;
      background: #fff;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      color: #111;
    }

    .menu button:hover {
      background: #f3f3f3;
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .close-popup {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 38px;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    .edit-note {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="review-box">
    <h2>Leave Your Review</h2>

    <div class="edit-note" id="edit-note">You are editing a review. Submit to save changes.</div>

    <input type="text" id="name" placeholder="Your Name" />

    <select id="rating">
      <option>⭐⭐⭐⭐⭐ Excellent</option>
      <option>⭐⭐⭐⭐ Good</option>
      <option>⭐⭐⭐ Average</option>
      <option>⭐⭐ Poor</option>
      <option>⭐ Bad</option>
    </select>

    <textarea id="message" placeholder="Write your experience here..."></textarea>

    <input type="file" id="photo" multiple />

    <button class="submit-btn" onclick="addReview()">Submit Review</button>

    <div id="reviews-list"></div>
  </div>

  <div class="popup" id="popup">
    <span class="close-popup" onclick="closePopup()">&times;</span>
    <img id="popup-img" src="" alt="Preview" />
  </div>

  <script>
    let editTarget = null;

    function addReview() {
      const nameInput = document.getElementById("name");
      const ratingInput = document.getElementById("rating");
      const messageInput = document.getElementById("message");
      const photoInput = document.getElementById("photo");
      const editNote = document.getElementById("edit-note");

      const name = nameInput.value.trim();
      const rating = ratingInput.value;
      const message = messageInput.value.trim();
      const files = photoInput.files;

      if (name === "" || message === "") {
        alert("Please fill all fields");
        return;
      }

      let imagesHTML = "";
      let filesHTML = "";

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const fileURL = URL.createObjectURL(file);

        if (file.type.startsWith("image/")) {
          imagesHTML += `<img src="${fileURL}" alt="${file.name}" onclick="openPopup('${fileURL}')">`;
        } else {
          filesHTML += `<a href="${fileURL}" target="_blank" download="${file.name}">${file.name}</a>`;
        }
      }

      const reviewHTML = `
        <div class="menu-container">
          <button class="menu-btn" onclick="toggleMenu(this)">&#8942;</button>
          <div class="menu">
            <button onclick="editReview(this)">Edit</button>
            <button onclick="deleteReview(this)">Delete</button>
          </div>
        </div>

        <h3>${escapeHTML(name)}</h3>
        <p><strong>${escapeHTML(rating)}</strong></p>
        <p class="review-message">${escapeHTML(message)}</p>
        <div class="review-images">${imagesHTML}</div>
        <div class="review-files">${filesHTML}</div>
      `;

      if (editTarget) {
        editTarget.innerHTML = reviewHTML;
        editTarget = null;
        editNote.style.display = "none";
      } else {
        const reviewItem = document.createElement("div");
        reviewItem.className = "review-item";
        reviewItem.innerHTML = reviewHTML;
        document.getElementById("reviews-list").appendChild(reviewItem);
      }

      nameInput.value = "";
      ratingInput.selectedIndex = 0;
      messageInput.value = "";
      photoInput.value = "";
    }

    function toggleMenu(button) {
      const currentMenu = button.nextElementSibling;
      const allMenus = document.querySelectorAll(".menu");

      allMenus.forEach(menu => {
        if (menu !== currentMenu) {
          menu.style.display = "none";
        }
      });

      currentMenu.style.display =
        currentMenu.style.display === "block" ? "none" : "block";
    }

    function deleteReview(button) {
      const reviewItem = button.closest(".review-item");
      reviewItem.remove();
    }

    function editReview(button) {
      const reviewItem = button.closest(".review-item");
      const name = reviewItem.querySelector("h3").innerText;
      const rating = reviewItem.querySelector("strong").innerText;
      const message = reviewItem.querySelector(".review-message").innerText;

      document.getElementById("name").value = name;
      document.getElementById("rating").value = rating;
      document.getElementById("message").value = message;
      document.getElementById("edit-note").style.display = "block";

      editTarget = reviewItem;
    }

    function openPopup(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popup-img").src = src;
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popup-img").src = "";
    }

    document.addEventListener("click", function(event) {
      if (!event.target.closest(".menu-container")) {
        document.querySelectorAll(".menu").forEach(menu => {
          menu.style.display = "none";
        });
      }

      if (event.target.id === "popup") {
        closePopup();
      }
    });

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>

</body>
</html>
