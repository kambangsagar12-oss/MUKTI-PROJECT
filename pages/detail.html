<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Details - CarRental</title>
  <link rel="stylesheet" href="../css/cars.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">CarRental</div>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="cars.html" class="active">Cars</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="receipt.html">My Bookings</a></li>
    </ul>

    <button class="nav-btn" onclick="location.href='cars.html'">Back to Cars</button>
  </nav>

  <div class="container">
    <div id="details"></div>
  </div>

  <script>
    const car = JSON.parse(localStorage.getItem("selectedCar"));
    const detailsBox = document.getElementById("details");

    if (car) {
      detailsBox.innerHTML = `
        <div class="detail-card">
          <img src="${car.src}" alt="${car.name}">
          <h1>${car.name}</h1>
          <p><strong>Type:</strong> ${car.type}</p>
          <p><strong>Year:</strong> ${car.year}</p>
          <p><strong>Engine:</strong> ${car.engine}</p>
          <p><strong>Seats:</strong> ${car.seats}</p>
          <p><strong>Fuel:</strong> ${car.fuel}</p>
          <p><strong>Top Speed:</strong> ${car.speed}</p>
          <p><strong>Price:</strong> £${car.price} / day</p>

          <div class="detail-buttons">
            <button class="back-btn" onclick="location.href='cars.html'">Back</button>
            <button class="book-btn" onclick="goToBooking()">Book Now</button>
          </div>
        </div>
      `;
    } else {
      detailsBox.innerHTML = `
        <div class="detail-card">
          <h2>No car selected</h2>
          <button class="back-btn" onclick="location.href='cars.html'">Go to Cars</button>
        </div>
      `;
    }

    function goToBooking() {
      window.location.href = "booking.html";
    }
  </script>

</body>
</html>
