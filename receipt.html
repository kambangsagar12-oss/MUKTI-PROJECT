<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Booking - CarRental</title>

<link rel="stylesheet" href="cars.css">
<link rel="stylesheet" href="cookie.css">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


</head>
<body>

 <nav class="navbar">
    <div class="logo">CarRental</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="cars.html">Cars</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="receipt.html">My Bookings</a></li>
    </ul>

    <button class="nav-btn" onclick="location.href='cars.html'">Book Now</button>
  </nav>

<div class="container">

<div class="receipt-card" id="receiptBox"></div>

<div class="receipt-buttons no-print">

<button class="back-btn" onclick="location.href='cars.html'">
Back to Cars
</button>

<div class="menu-box">

<button class="menu-btn" onclick="toggleMenu()">
⋮
</button>

<div class="dropdown-menu" id="dropdownMenu">

<button onclick="editBooking()">
Edit Booking
</button>

<button onclick="downloadReceipt()">
Download Receipt
</button>

<button onclick="deleteBooking()">
Delete Booking
</button>

</div>

</div>

</div>

</div>

<!-- COOKIE POPUP -->
  <div id="cookie-popup">
    <div class="cookie-box">
      <h3>We value your privacy</h3>

      <p>
        We use cookies to improve your browsing experience,
        personalize content, and analyze traffic.
      </p>

      <div class="cookie-buttons">
        <button id="accept-cookies">Accept</button>
        <button id="decline-cookies">Decline</button>
      </div>
    </div>
  </div>

<script>
const bookingData =
JSON.parse(localStorage.getItem("bookingData"));

const receiptBox =
document.getElementById("receiptBox");

if (bookingData) {

receiptBox.innerHTML = `
<div class="receipt-header">
<h2>My Booking</h2>
<p class="receipt-subtitle">
Your saved booking details
</p>
</div>

<div class="receipt-mini-grid">

<div class="mini-box">
<span>Booking ID</span>
<strong>${bookingData.bookingId}</strong>
</div>

<div class="mini-box">
<span>Booking Date</span>
<strong>${bookingData.bookingDate}</strong>
</div>

</div>

<div class="barcode-box">
<svg id="barcode"></svg>
</div>

<div class="receipt-section">

<p><strong>Name:</strong>
${bookingData.customerName}</p>

<p><strong>Address:</strong>
${bookingData.address}</p>

<p><strong>Email:</strong>
${bookingData.email}</p>

<p><strong>Phone:</strong>
${bookingData.phone}</p>

<p><strong>Car Name:</strong>
${bookingData.carName}</p>

<p><strong>From Date:</strong>
${bookingData.fromDate}</p>

<p><strong>To Date:</strong>
${bookingData.toDate}</p>

<p><strong>Payment:</strong>
${bookingData.paymentInfo}</p>

<p><strong>Total Charges:</strong>
£${bookingData.totalCost}</p>

</div>

<div class="receipt-note">

<h3>Important Notes</h3>

<p>• Please keep this receipt safe.</p>
<p>• Show this receipt during car collection.</p>
<p>• Booking ID is required for support.</p>
<p>• If download does not work, take screenshot of receipt.</p>

</div>
`;

JsBarcode("#barcode", bookingData.bookingId, {
format: "CODE128",
displayValue: true,
width: 2,
height: 70,
margin: 10
});

} else {

receiptBox.innerHTML = `
<div class="receipt-header">
<h2>No Booking Found</h2>
<p class="receipt-subtitle">
You have not booked a car yet.
</p>
</div>
`;
}

function toggleMenu() {
const menu = document.getElementById("dropdownMenu");

if(menu.style.display === "block"){
menu.style.display = "none";
}else{
menu.style.display = "block";
}
}

function editBooking() {
window.location.href = "booking.html";
}

function deleteBooking() {

let confirmDelete =
confirm("Delete saved booking?");

if(confirmDelete){
localStorage.removeItem("bookingData");
alert("Booking deleted.");
location.reload();
}
}

window.onclick = function(event){

if(!event.target.matches('.menu-btn')){

let menu =
document.getElementById("dropdownMenu");

if(menu){
menu.style.display = "none";
}

}
}

async function downloadReceipt() {

if (!bookingData) return;

const { jsPDF } = window.jspdf;

const receipt =
document.getElementById("receiptBox");

const canvas =
await html2canvas(receipt, {
scale: 2
});

const imgData =
canvas.toDataURL("image/png");

const pdf =
new jsPDF("p", "mm", "a4");

const imgWidth = 190;

const imgHeight =
canvas.height * imgWidth / canvas.width;

pdf.addImage(
imgData,
"PNG",
10,
10,
imgWidth,
imgHeight
);

pdf.save(
"Receipt-" +
bookingData.bookingId +
".pdf"
);
}
</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js" defer></script>
  <script src="cars.js" defer></script>

</body>
</html>
